<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR2ROKL | FINAL PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap');

        :root { --bg: #000; --text: #fff; --dim: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; height: 100dvh; overflow: hidden; }

        /* Фоновая сетка */
        #grid { position: fixed; inset: -100px; background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }

        /* Навигация */
        nav { padding: 30px; display: flex; justify-content: space-between; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .menu { display: flex; gap: 15px; }
        .menu-btn { background: none; border: none; color: #fff; font-family: 'Syncopate', sans-serif; font-size: 9px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .menu-btn.active { opacity: 1; border-bottom: 1px solid #fff; }

        main { height: 100dvh; display: flex; position: relative; }
        .section { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .section.active { display: flex; }

        /* CONTACT FORM */
        .contact-form { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        input, textarea { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; color: #fff; font-family: 'Space Mono'; outline: none; }
        input:focus, textarea:focus { border-color: #fff; }
        .send-btn { background: #fff; color: #000; border: none; padding: 15px; font-family: 'Syncopate'; font-size: 10px; cursor: pointer; }

        /* SHOP & WIND */
        #shop-canvas { position: absolute; inset: 0; pointer-events: none; }
        .nothing { font-family: 'Syncopate', sans-serif; font-size: clamp(30px, 10vw, 80px); animation: shake 0.5s infinite alternate; }
        @keyframes shake { from { transform: skewX(-5deg); } to { transform: skewX(5deg); } }

        /* SOCIALS */
        .social-wrap { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .info-btn { color: #fff; text-decoration: none; border: 1px solid #fff; padding: 15px 30px; font-size: 11px; letter-spacing: 3px; transition: 0.3s; }
        .info-btn:hover { background: #fff; color: #000; }

        /* PLAYER-TRANSFORMER */
        #player-ui { position: fixed; z-index: 950; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; border: 1px solid #222; }
        #player-ui.full { inset: 0; border: none; padding: 60px; justify-content: center; align-items: center; }
        #player-ui.mini { bottom: 30px; right: 30px; width: 340px; height: 130px; border-radius: 25px; padding: 20px; justify-content: space-between; }
        
        .track-meta { width: 100%; text-align: center; }
        .full .track-name { font-family: 'Syncopate', sans-serif; font-size: clamp(20px, 5vw, 45px); margin-bottom: 10px; }
        .mini .track-name { font-size: 12px; font-weight: bold; }

        .seek-box { width: 100%; padding: 10px 0; cursor: pointer; }
        .seek-track { width: 100%; height: 2px; background: #222; position: relative; }
        .seek-fill { height: 100%; background: #fff; width: 0%; position: absolute; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .play-btn { border: 1px solid #fff; border-radius: 50%; display: flex; gap: 4px; align-items: center; justify-content: center; cursor: pointer; }
        .full .play-btn { width: 70px; height: 70px; }
        .mini .play-btn { width: 35px; height: 35px; }
        .tower { width: 3px; background: #fff; }
        .full .tower { height: 20px; }
        .mini .tower { height: 10px; }

        @media (max-width: 600px) {
            #player-ui.mini { width: 90%; right: 5%; bottom: 20px; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="grid"></div>

    <nav>
        <div style="font-size: 9px; letter-spacing: 1px; font-weight: bold;">PR2ROKL</div>
        <div class="menu">
            <button class="menu-btn" onclick="tab('tour')">TOUR</button>
            <button class="menu-btn" onclick="tab('shop')">SHOP</button>
            <button class="menu-btn active" onclick="tab('player')">PLAYER</button>
            <button class="menu-btn" onclick="tab('contact')">CONTACT</button>
            <button class="menu-btn" onclick="tab('info')">INFO</button>
        </div>
    </nav>

    <main>
        <section id="tour" class="section"><h1 style="font-family:Syncopate; font-size:12vw;">2026</h1></section>
        
        <section id="shop" class="section">
            <canvas id="shop-canvas"></canvas>
            <h2 class="nothing">NOTHING</h2>
        </section>

        <section id="player" class="section active"></section>

        <section id="contact" class="section">
            <div class="contact-form">
                <h2 style="font-family:Syncopate; font-size: 12px; margin-bottom: 15px;">DIRECT MESSAGE</h2>
                <input type="text" id="u-name" placeholder="NAME / CONTACT">
                <textarea id="u-msg" placeholder="YOUR MESSAGE..."></textarea>
                <button class="send-btn" onclick="sendMsg()">SEND TO TELEGRAM</button>
                <p id="status" style="font-size: 10px; margin-top: 10px;"></p>
            </div>
        </section>

        <section id="info" class="section">
            <div class="social-wrap">
                <a href="https://t.me/pr2rokl" target="_blank" class="info-btn">TELEGRAM</a>
                <a href="https://www.instagram.com/pr2rokl?igsh=ZWc1aTNuYjJtYm5m" target="_blank" class="info-btn">INSTAGRAM</a>
            </div>
        </section>
    </main>

    <div id="player-ui" class="full">
        <div class="track-meta"><span id="track-title" class="track-name">pr2rokl - Stay Higher</span></div>
        <div class="seek-box" id="sb"><div class="seek-track"><div id="sf" class="seek-fill"></div></div></div>
        <div class="controls">
            <button style="background:none; border:none; color:#fff; cursor:pointer;" onclick="change(-1)">⏮</button>
            <div class="play-btn" onclick="togglePlay()"><div id="towers" style="display:flex; gap:4px; opacity:0.3;"><div class="tower"></div><div class="tower"></div></div></div>
            <button style="background:none; border:none; color:#fff; cursor:pointer;" onclick="change(1)">⏭</button>
            <input type="range" style="width:50px;" min="0" max="1" step="0.1" oninput="audio.volume=this.value">
        </div>
    </div>

    <audio id="audio-core"></audio>

    <script>
        // ДАННЫЕ ПОЛЬЗОВАТЕЛЯ
        const TOKEN = "8380682945:AAFusO8qTGmoXunF8HB53ywd5aXI11uEgVQ";
        const CHAT_ID = "6483020703";

        const songs = [
            { n: "pr2rokl - Stay Higher", s: "pr2rokI' - Stay Higher.mp3" },
            { n: "pr2rokl - Underground", s: "pr2rokI', TheRichBoySwag - Underground.mp3" },
            { n: "pr2rokl - DANCE", s: "pr2rokI', nett - DANCE.mp3" }
        ];

        let cur = 0;
        const audio = document.getElementById('audio-core');
        const ui = document.getElementById('player-ui');
        const towers = document.getElementById('towers');

        function load(i) { audio.src = songs[i].s; document.getElementById('track-title').innerText = songs[i].n; }
        function togglePlay() { 
            if(audio.paused) { audio.play(); towers.style.opacity="1"; } 
            else { audio.pause(); towers.style.opacity="0.3"; } 
        }
        function change(d) { cur = (cur+d+songs.length)%songs.length; load(cur); audio.play(); towers.style.opacity="1"; }

        audio.ontimeupdate = () => { document.getElementById('sf').style.width = (audio.currentTime/audio.duration*100) + "%"; };
        document.getElementById('sb').onclick = (e) => { audio.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth) * audio.duration; };

        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            ui.className = (id === 'player') ? 'full' : 'mini';
            if(id === 'shop') initWind();
        }

        async function sendMsg() {
            const n = document.getElementById('u-name').value;
            const m = document.getElementById('u-msg').value;
            const s = document.getElementById('status');
            if(!n || !m) { s.innerText = "EMPTY FIELDS"; return; }
            s.innerText = "SENDING...";
            try {
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: `📩 SITE MSG:\n\n👤 ${n}\n💬 ${m}`})
                });
                s.innerText = "SENT TO PR2ROKL";
                document.getElementById('u-name').value = ''; document.getElementById('u-msg').value = '';
            } catch(e) { s.innerText = "ERROR"; }
        }

        function initWind() {
            const c = document.getElementById('shop-canvas'); const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let p = []; for(let i=0; i<150; i++) p.push({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()*10+15, o:Math.random()*0.6+0.2});
            function d() {
                if(!document.getElementById('shop').classList.contains('active')) return;
                ctx.clearRect(0,0,c.width,c.height);
                p.forEach(i => { ctx.fillStyle=`rgba(255,255,255,${i.o})`; i.x+=i.s; if(i.x>c.width) i.x=-10; ctx.fillRect(i.x,i.y,2,1); });
                requestAnimationFrame(d);
            } d();
        }
        load(0);
    </script>
</body>
</html>
