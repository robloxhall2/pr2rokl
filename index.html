<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR2ROKL | PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #000;
            --p-bg: #080808;
            --text: #fff;
            --dim: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Space Mono', monospace; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* Инвертирующий курсор для ПК */
        #cursor {
            width: 22px; height: 22px;
            border: 1px solid #fff;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
            display: none;
        }
        @media (pointer: fine) { body { cursor: none; } #cursor { display: block; } }

        /* Сетка фона */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(#0a0a0a 1px, transparent 1px), linear-gradient(90deg, #0a0a0a 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        /* Навигация */
        nav { padding: clamp(20px, 5vw, 30px); display: flex; justify-content: space-between; align-items: flex-start; }
        .menu { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .menu-btn { 
            background: none; border: none; color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-size: clamp(14px, 2vw, 18px); 
            cursor: pointer; opacity: 0.2; transition: 0.3s; 
        }
        .menu-btn.active { opacity: 1; border-bottom: 1px solid #fff; }

        /* Контент */
        main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .section { display: none; text-align: center; width: 100%; }
        .section.active { display: block; }
        .big { font-family: 'Syncopate', sans-serif; font-size: clamp(45px, 15vw, 120px); letter-spacing: -5px; text-transform: uppercase; }

        /* ПЛЕЕР */
        .player-bar { 
            background: var(--p-bg); 
            border-top: 1px solid #111; 
            padding: 10px 20px 25px; 
            z-index: 500; 
        }

        /* Зона перемотки */
        .seek-zone { 
            width: 100%; height: 20px; 
            display: flex; align-items: center; 
            cursor: pointer; 
        }
        .seek-bg { width: 100%; height: 2px; background: #222; position: relative; }
        .seek-fill { height: 100%; background: #fff; width: 0%; position: absolute; }

        /* Элементы управления */
        .ui-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-top: 5px; }
        
        .track-info { flex: 1; min-width: 0; }
        .t-main { font-weight: 700; font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-sub { font-size: 10px; color: var(--dim); margin-top: 2px; display: block; }

        .controls { display: flex; align-items: center; gap: clamp(15px, 5vw, 25px); }
        .c-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; }

        /* Кнопка "Две башни" */
        .tower-btn { 
            width: 44px; height: 44px; 
            background: #000; border: 1px solid #222; 
            display: flex; gap: 6px; align-items: center; justify-content: center; 
            cursor: pointer;
        }
        .tower { width: 4px; height: 16px; background: #fff; transition: 0.3s; }

        /* Громкость */
        .vol-box { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }
        .vol-input { -webkit-appearance: none; width: 70px; height: 2px; background: #222; outline: none; }
        .vol-input::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #fff; cursor: pointer; border-radius: 50%; }

        @media (max-width: 600px) {
            .vol-box { display: none; }
            .player-bar { padding: 10px 15px 35px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="grid"></div>

    <nav>
        <div style="font-size: 10px; color: #333; letter-spacing: 2px; font-weight: 700;">PR2ROKL // PROTOCOL</div>
        <div class="menu">
            <button class="menu-btn active" onclick="tab('tour')">TOUR</button>
            <button class="menu-btn" onclick="tab('shop')">SHOP</button>
            <button class="menu-btn" onclick="tab('info')">INFO</button>
        </div>
    </nav>

    <main>
        <section id="tour" class="section active"><h1 class="big">SOON</h1></section>
        <section id="shop" class="section"><p style="opacity:0.2; letter-spacing:10px; font-size: 10px;">VOID_CONTENT</p></section>
        <section id="info" class="section">
            <a href="https://t.me/pr2rokl" target="_blank" style="color:#fff; text-decoration:none; border: 1px solid #222; padding: 15px 30px; font-size: 12px; letter-spacing: 2px;">TELEGRAM</a>
        </section>
    </main>

    <div class="player-bar">
        <div class="seek-zone" id="seek-bar">
            <div class="seek-bg"><div id="seek-fill" class="seek-fill"></div></div>
        </div>

        <div class="ui-row">
            <div class="track-info">
                <span id="name" class="t-main">pr2rokl - Stay Higher</span>
                <span id="art" class="t-sub">Streaming now</span>
            </div>

            <div class="controls">
                <button class="c-btn" onclick="change(-1)">⏮</button>
                <div class="tower-btn" onclick="toggle()">
                    <div id="towers" style="display:flex; gap:6px; opacity: 0.3;">
                        <div class="tower"></div><div class="tower"></div>
                    </div>
                </div>
                <button class="c-btn" onclick="change(1)">⏭</button>
            </div>

            <div class="vol-box">
                <input type="range" class="vol-input" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)">
            </div>
        </div>
    </div>

    <audio id="core"></audio>

    <script>
        const songs = [
            { display: "pr2rokl - Stay Higher", sub: "Official Track", f: "pr2rokI' - Stay Higher.mp3" },
            { display: "Underground - pr2rokl, TheRichBoySwag", sub: "Collab", f: "pr2rokI', TheRichBoySwag - Underground.mp3" },
            { display: "DANCE - pr2rokl, nett", sub: "Collab", f: "pr2rokI', nett - DANCE.mp3" }
        ];

        let cur = 0;
        const audio = document.getElementById('core');
        const fill = document.getElementById('seek-fill');
        const towers = document.getElementById('towers');

        function loadSong(i) {
            const s = songs[i];
            document.getElementById('name').innerText = s.display;
            document.getElementById('art').innerText = s.sub;
            audio.src = s.f;
        }

        function toggle() {
            if(audio.paused) { 
                audio.play().catch(e => console.log("Нажмите на страницу для активации звука")); 
                towers.style.opacity = "1"; 
            } else { 
                audio.pause(); 
                towers.style.opacity = "0.3"; 
            }
        }

        function change(d) {
            cur = (cur + d + songs.length) % songs.length;
            loadSong(cur); 
            audio.play(); 
            towers.style.opacity = "1";
        }

        // Перемотка кликом
        document.getElementById('seek-bar').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        };

        function setVol(v) { audio.volume = v; }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
            }
        };

        // Вкладки
        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Курсор
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 11 + 'px';
            cursor.style.top = e.clientY - 11 + 'px';
        });

        loadSong(0);
    </script>
</body>
</html>
