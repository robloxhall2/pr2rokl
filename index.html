<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR2ROKL | VERSION 5.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400&display=swap');

        :root {
            --bg: #050505;
            --accent: #ffffff;
            --line: rgba(255, 255, 255, 0.1);
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Space Mono', monospace;
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Тонкая сетка для объема */
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: -1;
            opacity: 0.3;
        }

        nav {
            padding: 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--line);
        }
        .logo { font-family: 'Syncopate'; font-size: clamp(10px, 4vw, 14px); letter-spacing: 2px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-item { 
            font-size: 9px; color: var(--text-dim); cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; font-weight: bold;
        }
        .nav-item.active { color: #fff; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .section { display: none; width: 100%; max-width: 450px; text-align: center; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CONTACT */
        .f-group { border-bottom: 1px solid var(--line); margin-bottom: 15px; }
        input, textarea {
            width: 100%; background: transparent; border: none; padding: 15px 5px;
            color: #fff; font-family: 'Space Mono'; outline: none;
        }
        .btn-send {
            width: 100%; padding: 18px; background: #fff; color: #000;
            font-family: 'Syncopate'; font-size: 10px; border: none; cursor: pointer;
        }

        /* INFO - УЛУЧШЕННЫЙ СПИСОК */
        .info-container { border-top: 1px solid var(--line); }
        .info-link {
            display: flex; justify-content: space-between; padding: 25px 10px;
            border-bottom: 1px solid var(--line); text-decoration: none; color: #fff;
            transition: background 0.3s;
        }
        .info-link:hover { background: rgba(255,255,255,0.03); }
        .info-label { font-family: 'Syncopate'; font-size: 11px; }
        .info-val { color: var(--text-dim); font-size: 10px; }

        /* ПЛЕЕР */
        .player-zone {
            background: #000; border-top: 1px solid #fff;
            padding: 20px 30px 40px; position: relative;
        }
        .progress-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #111; cursor: pointer;
        }
        .progress-fill { height: 100%; background: #fff; width: 0%; }

        .player-content { display: flex; justify-content: space-between; align-items: center; }
        .t-info { text-align: left; }
        .t-title { font-family: 'Syncopate'; font-size: 11px; display: block; margin-bottom: 5px; }
        .t-artist { font-size: 9px; color: var(--text-dim); }

        .p-controls { display: flex; align-items: center; gap: 25px; }
        .p-skip { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; }
        
        /* ТА САМАЯ КНОПКА С ТРЕУГОЛЬНИКОМ */
        .p-main {
            width: 48px; height: 48px; border: 1px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.2s;
        }
        .p-main:hover { background: #fff; color: #000; }
        
        /* Иконки внутри кнопки */
        .icon-play {
            width: 0; height: 0; 
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid currentColor;
            margin-left: 4px; /* смещение для центровки треугольника */
            display: block;
        }
        .icon-pause {
            display: none;
            gap: 4px;
        }
        .pause-bar { width: 4px; height: 16px; background: currentColor; }

        /* Состояния плеера */
        .playing .icon-play { display: none; }
        .playing .icon-pause { display: flex; }

        @media (max-width: 600px) {
            .player-content { flex-direction: column; gap: 20px; text-align: center; }
            .t-info { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <nav>
        <div class="logo">PR2ROKL</div>
        <div class="nav-links">
            <span class="nav-item" onclick="tab('tour', this)">Tour</span>
            <span class="nav-item" onclick="tab('contact', this)">Contact</span>
            <span class="nav-item active" onclick="tab('info', this)">Info</span>
        </div>
    </nav>

    <main>
        <section id="tour" class="section">
            <h1 style="font-family:'Syncopate'; font-size: 20px; opacity: 0.2;">COMMING_2026</h1>
        </section>

        <section id="contact" class="section">
            <div class="f-group"><input type="text" id="name" placeholder="IDENT_NAME"></div>
            <div class="f-group"><textarea id="msg" placeholder="MESSAGE_DATA"></textarea></div>
            <button class="btn-send" onclick="send()">EXECUTE_SEND</button>
            <p id="st" style="font-size: 9px; margin-top: 15px; color: var(--text-dim);"></p>
        </section>

        <section id="info" class="section active">
            <div class="info-container">
                <a href="https://t.me/pr2rokl" target="_blank" class="info-link">
                    <span class="info-label">Telegram</span>
                    <span class="info-val">@pr2rokl</span>
                </a>
                <a href="https://instagram.com/pr2rokl" target="_blank" class="info-link">
                    <span class="info-label">Instagram</span>
                    <span class="info-val">FOLLOW</span>
                </a>
            </div>
        </section>
    </main>

    <div class="player-zone" id="player-container">
        <div class="progress-line" id="pb"><div id="pf" class="progress-fill"></div></div>
        
        <div class="player-content">
            <div class="t-info">
                <span id="cur-track" class="t-title">Stay Higher</span>
                <span class="t-artist">pr2rokl // audio_01</span>
            </div>

            <div class="p-controls">
                <button class="p-skip" onclick="skip(-1)">⏮</button>
                <div class="p-main" id="play-btn" onclick="toggle()">
                    <div class="icon-play"></div>
                    <div class="icon-pause">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
                <button class="p-skip" onclick="skip(1)">⏭</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const TOKEN = "7339893967:AAHV9K92D2uX8f_N8Xj_73663b6k9B9bQvE";
        const CHAT = "6483020703";

        const playlist = [
            { n: "Stay Higher", s: "project-16_Q09SZjFu.mp3" },
            { n: "Underground", s: "pr2rokI', nett - Underground.mp3" },
            { n: "DANCE", s: "pr2rokI', nett - DANCE.mp3" }
        ];

        let cur = 0;
        const audio = document.getElementById('audio');
        const fill = document.getElementById('pf');
        const btn = document.getElementById('player-container');

        function load(i) {
            audio.src = playlist[i].s;
            document.getElementById('cur-track').innerText = playlist[i].n;
        }

        function toggle() {
            if(audio.paused) { 
                audio.play(); 
                btn.classList.add('playing'); 
            } else { 
                audio.pause(); 
                btn.classList.remove('playing'); 
            }
        }

        function skip(d) {
            cur = (cur + d + playlist.length) % playlist.length;
            load(cur); audio.play(); btn.classList.add('playing');
        }

        audio.ontimeupdate = () => {
            fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        };

        document.getElementById('pb').onclick = (e) => {
            audio.currentTime = (e.clientX / window.innerWidth) * audio.duration;
        };

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function send() {
            const n = document.getElementById('name').value;
            const m = document.getElementById('msg').value;
            if(!n || !m) return;
            document.getElementById('st').innerText = "SENDING...";
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT, text: `SNDER: ${n}\nDATA: ${m}`})
            });
            document.getElementById('st').innerText = "DATA_LOGGED.";
        }

        load(0);
    </script>
</body>
</html>
